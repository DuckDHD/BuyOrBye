services:
  postgres:
    image: postgres:15
    container_name: should-i-get-it-db
    environment:
      POSTGRES_DB: should_i_get_it
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: should-i-get-it-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: should-i-get-it-app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/should_i_get_it?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 👉 Do NOT mount the whole repo; it hides the binary.
    # Mount only what the app reads at runtime (optional, read-only).
    volumes:
      - ./static:/app/static:ro
      - ./migrations:/app/migrations:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
